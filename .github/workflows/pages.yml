name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            make \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-extra \
            biber \
            fonts-texgyre
          fc-cache -f -v || true

      - name: Build PDFs
        run: make

      - name: Prepare Pages artifact
        run: |
          mkdir -p site/pdfs
          cp index.html site/
          shopt -s nullglob
          pdfs=(./*.pdf)
          if [ ${#pdfs[@]} -gt 0 ]; then
            cp "${pdfs[@]}" site/pdfs/
          else
            echo "No PDFs were produced in the repository root."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
